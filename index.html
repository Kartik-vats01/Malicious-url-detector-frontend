<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detectore - Real Time Phishing Website Detector</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="logo">Detectore</div>
        <!-- mobile menu toggle -->
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <nav class="main-nav">
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#news">News</a></li>
                <li><a href="#contact">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="home-page">
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Enter website URL or keyword" />
            <button id="scanButton">Scan</button>
        </section>

        <section id="resultArea" class="result-section">
            <!-- Future ML model results will appear here -->
        </section>

        <section class="last-searches">
            <h2>Last Searches</h2>
            <table id="searchTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Query</th>
                        <th>Date/Time</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- entries will be added here by JS -->
                </tbody>
            </table>
        </section>

        <button id="reportButton" class="report-button">Report a Problem</button>
    </main>

    <script src="js/Script.js"></script>
</body>
</html>
